<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><meta name="theme-color" content="#111"/><title>RowMeter Debug</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;color:#eee;font:13px/1.6 monospace;padding:12px}button{font:inherit;padding:10px 20px;border:none;border-radius:8px;cursor:pointer}#go{background:#F0A500;color:#111;font-size:16px;display:block;margin:20px auto}#copy{background:#333;color:#F0A500;margin:8px 0}.f{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #222}.k{color:#888}.v{color:#F0A500;text-align:right}h2{font-size:12px;color:#666;letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 8px}pre{background:#0a0a0a;padding:10px;border-radius:6px;overflow-x:auto;font-size:11px;color:#F0A500;margin:8px 0}#log{color:#666;font-size:10px}p.info{color:#555;font-size:11px;text-align:center;margin:8px}</style></head><body><h1 style="text-align:center;font-size:20px">RowMeter Debug</h1><p class="info">Connect → row a few strokes → tap Copy Data → paste to Claude</p><button id="go" onclick="doConnect()">Connect Rower</button><div id="out"></div><script>
var dev,ch,pkts=[],latest;
function toHex(d){var b=[];for(var i=0;i<d.byteLength;i++)b.push(d.getUint8(i).toString(16).padStart(2,'0'));return b.join(' ')}
function parse(d){var o=0,f=d.getUint16(o,true);o+=2;var r={flags:'0x'+f.toString(16).padStart(4,'0'),flagsBits:f.toString(2).padStart(16,'0').split('').reverse().join(''),fields:{}};if(!(f&1)){r.fields['StrokeRate']=d.getUint8(o)*0.5+' spm';o++;r.fields['StrokeCount']=d.getUint16(o,true);o+=2}else r.fields['StrokeRate']='absent';if(f&2){r.fields['AvgStrokeRate']=d.getUint8(o)*0.5;o++}if(f&4){r.fields['Distance(machine)']=((d.getUint8(o))|(d.getUint8(o+1)<<8)|(d.getUint8(o+2)<<16))+' m';o+=3}if(f&8){var p=d.getUint16(o,true);r.fields['InstPace(machine)']=p+' s/km = '+Math.round(p/2)+' s/500m';o+=2}if(f&16){r.fields['AvgPace(machine)']=d.getUint16(o,true)+' s/km';o+=2}if(f&32){r.fields['InstPower']=d.getInt16(o,true)+' W';o+=2}else r.fields['InstPower']='ABSENT';if(f&64){r.fields['AvgPower']=d.getInt16(o,true)+' W';o+=2}if(f&128){r.fields['Resistance']=d.getInt16(o,true);o+=2}if(f&256){r.fields['TotalEnergy(machine)']=d.getUint16(o,true)+' kcal';o+=2;r.fields['Energy/hr']=d.getUint16(o,true);o+=2;r.fields['Energy/min']=d.getUint8(o);o++}if(f&512){r.fields['HeartRate']=d.getUint8(o)+' bpm';o++}if(f&2048){r.fields['ElapsedTime']=d.getUint16(o,true)+' s';o+=2}r.hex=toHex(d);r.bytes=d.byteLength;r.consumed=o;return r}
function onN(e){var p=parse(e.target.value);p.time=new Date().toLocaleTimeString();latest=p;pkts.unshift(p);if(pkts.length>20)pkts.pop();render()}
function render(){if(!latest)return;var h='<button id="copy" onclick="doCopy()">Copy Data</button>';h+='<h2>Flags</h2><pre>'+latest.flags+' = '+latest.flagsBits+' (LSB→MSB)\nBit5(power): '+(latest.flagsBits[5]==='1'?'YES':'NO')+'</pre>';h+='<h2>Fields</h2>';for(var k in latest.fields){var v=latest.fields[k];var c=String(v).includes('absent')||String(v).includes('ABSENT')?'#444':'#F0A500';h+='<div class="f"><span class="k">'+k+'</span><span class="v" style="color:'+c+'">'+v+'</span></div>'}h+='<h2>Raw Hex ('+latest.bytes+' bytes, '+latest.consumed+' consumed)</h2><pre>'+latest.hex+'</pre>';h+='<h2>Packet Log</h2><div id="log">';pkts.forEach(function(p){h+=p.time+' '+p.hex+'<br>'});h+='</div>';document.getElementById('out').innerHTML=h}
async function doConnect(){try{document.getElementById('go').textContent='Scanning...';if(!navigator.bluetooth)throw new Error('No Web Bluetooth. Use Bluefy on iPhone.');dev=await navigator.bluetooth.requestDevice({filters:[{services:[0x1826]}]});var srv=await dev.gatt.connect();var svc=await srv.getPrimaryService(0x1826);ch=await svc.getCharacteristic(0x2AD1);await ch.startNotifications();ch.addEventListener('characteristicvaluechanged',onN);document.getElementById('go').textContent='Connected: '+dev.name;document.getElementById('go').style.background='#4ADE80'}catch(e){document.getElementById('go').textContent='Connect Rower';alert(e.message)}}
function doCopy(){var d={device:dev?dev.name:'?',latest:latest,packets:pkts.slice(0,10)};navigator.clipboard?navigator.clipboard.writeText(JSON.stringify(d,null,2)).then(function(){alert('Copied! Paste this to Claude.')}):alert(JSON.stringify(d))}
</script></body></html>
